name: Builder

on:
  push:
    branches:
      - main
    paths:
      - outback_mate3_addon/**
      - .github/workflows/builder.yaml
  pull_request:
    paths:
      - outback_mate3_addon/**
      - .github/workflows/builder.yaml
  workflow_dispatch:

concurrency:
  group: builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64, armhf, armv7, i386]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync bundled integration into add-on dir
        run: ./scripts/sync-bundled-integration.sh

      - name: Build add-on (${{ matrix.arch }})
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            --test \
            --${{ matrix.arch }} \
            --target outback_mate3_addon \
            --addon
