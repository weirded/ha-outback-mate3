name: Tests

on:
  push:
    branches:
      - main
      - dev
      - "weirded/**"
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Integration tests (custom_components/outback_mate3)
        run: pytest tests -v

      - name: Add-on tests (outback_mate3_addon)
        run: pytest outback_mate3_addon/tests -v
