name: "Outback MATE3"
version: "2.0.0-dev4"
slug: outback_mate3
description: >-
  Listens for Outback MATE3 UDP streaming telemetry and relays parsed device
  state to the Home Assistant Outback MATE3 integration over WebSocket.
url: https://github.com/weirded/ha-outback-mate3
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
host_network: true
# Disable Docker's tini init so s6-overlay (from the base image) can run as pid 1.
init: false
# Grant access to the Supervisor API — needed so the add-on can announce its
# WebSocket endpoint to the integration via Hass.io discovery.
hassio_api: true
# Whitelists the service name(s) we may announce.
discovery:
  - outback_mate3
options:
  udp_port: 57027
  ws_port: 8099
  log_level: info
  min_update_interval_s: 30
schema:
  udp_port: port
  ws_port: port
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  min_update_interval_s: float(0,)
